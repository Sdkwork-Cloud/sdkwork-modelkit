version: 1
defaultProfile: cloud.split-services.production

profiles:
  cloud.split-services.production:
    install:
      layout: binary-package
    expose:
      - domain: modelkit.sdkwork.com
        tls: sdkwork.com
        mode: web+api
        web: pc
    packages:
      - desktop-windows
      - desktop-macos
      - desktop-linux

  standalone.unified-process.development:
    expose:
      - domain: localhost
        tls: off
        mode: web+api
        web: pc
    packages: []

  standalone.split-services.development:
    expose:
      - domain: localhost
        tls: off
        mode: web+api
        web: pc
    packages: []

  cloud.split-services.development:
    expose:
      - domain: localhost
        tls: off
        mode: web+api
        web: pc
    packages: []

  standalone.unified-process.production:
    install:
      layout: binary-package
    expose:
      - domain: localhost
        tls: off
        mode: web+api
        web: pc
    packages:
      - desktop-windows
      - desktop-macos
      - desktop-linux
    overrides:
      allowInsecureTls: true
